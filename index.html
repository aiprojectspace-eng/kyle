<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapikruddin Kyle Adventure</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:Arial;
color:white;
touch-action:none;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:20px;
left:20px;
font-size:24px;
font-weight:bold;
text-shadow:0 0 10px black;
}

#gameOver{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
backdrop-filter:blur(6px);
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff9800;
color:white;
font-size:18px;
cursor:pointer;
margin-top:15px;
}
</style>
</head>
<body>

<div id="ui">🐟 Score: <span id="score">0</span></div>

<div id="gameOver">
<h1>💀 Oyen Kena!</h1>
<p>Score: <span id="finalScore"></span></p>
<button onclick="restart()">Play Again</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const scoreEl=document.getElementById("score");
const gameOverUI=document.getElementById("gameOver");
const finalScore=document.getElementById("finalScore");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* ================= BACKGROUND ================= */

let clouds=[];
let particles=[];

function spawnCloud(){
clouds.push({
x:canvas.width,
y:Math.random()*150,
size:50+Math.random()*80,
speed:1+Math.random()*2
});
}

setInterval(spawnCloud,2000);

/* ================= CAT ================= */

const catImg=new Image();
catImg.src="kyle.png";

let cat={
x:80,
y:canvas.height-180,
w:90,
h:90,
vy:0,
gravity:0.8,
jump:-16,
ground:canvas.height-180,
onGround:true
};

canvas.addEventListener("click",jump);
canvas.addEventListener("touchstart",jump);

function jump(){
if(cat.onGround){
cat.vy=cat.jump;
cat.onGround=false;
}
}

/* ================= GAME OBJECTS ================= */

let fish=[];
let obstacles=[];
let score=0;
let running=true;

/* ================= SPAWN ================= */

setInterval(()=>{
if(!running) return;
if(Math.random()<0.7){
fish.push({
x:canvas.width,
y:cat.ground+10,
r:15,
speed:6
});
}

if(Math.random()<0.5){
obstacles.push({
x:canvas.width,
y:cat.ground,
w:50,
h:50,
speed:6
});
}
},1000);

/* ================= PARTICLE EFFECT ================= */

function createParticles(x,y){
for(let i=0;i<15;i++){
particles.push({
x,y,
dx:(Math.random()-0.5)*6,
dy:(Math.random()-0.5)*6,
alpha:1
});
}
}

/* ================= GAME LOOP ================= */

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* ----- SKY GRADIENT ----- */
let sky=ctx.createLinearGradient(0,0,0,canvas.height);
sky.addColorStop(0,"#87CEEB");
sky.addColorStop(1,"#E0F6FF");
ctx.fillStyle=sky;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* ----- CLOUDS ----- */
clouds.forEach((c,i)=>{
c.x-=c.speed;
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
ctx.fill();
if(c.x<-200) clouds.splice(i,1);
});

/* ----- GROUND ----- */
ctx.fillStyle="#4CAF50";
ctx.fillRect(0,cat.ground+80,canvas.width,200);

/* ----- CAT PHYSICS ----- */
cat.vy+=cat.gravity;
cat.y+=cat.vy;

if(cat.y>=cat.ground){
cat.y=cat.ground;
cat.vy=0;
cat.onGround=true;
}

/* SHADOW */
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.beginPath();
ctx.ellipse(cat.x+45,cat.y+90,40,12,0,0,Math.PI*2);
ctx.fill();

/* CAT */
ctx.drawImage(catImg,cat.x,cat.y,cat.w,cat.h);

/* ----- FISH ----- */
for(let i=fish.length-1;i>=0;i--){
let f=fish[i];
f.x-=f.speed;

ctx.fillStyle="gold";
ctx.beginPath();
ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
ctx.fill();

/* Collision */
if(
cat.x < f.x+f.r &&
cat.x+cat.w > f.x-f.r &&
cat.y < f.y+f.r &&
cat.y+cat.h > f.y-f.r
){
score++;
scoreEl.innerText=score;
createParticles(f.x,f.y);
fish.splice(i,1);
}

if(f.x<-50) fish.splice(i,1);
}

/* ----- OBSTACLES ----- */
for(let i=obstacles.length-1;i>=0;i--){
let o=obstacles[i];
o.x-=o.speed;

ctx.fillStyle="#8B4513";
ctx.fillRect(o.x,o.y,o.w,o.h);

/* Collision */
if(
cat.x < o.x+o.w &&
cat.x+cat.w > o.x &&
cat.y < o.y+o.h &&
cat.y+cat.h > o.y
){
gameOver();
}

if(o.x<-100) obstacles.splice(i,1);
}

/* ----- PARTICLES ----- */
for(let i=particles.length-1;i>=0;i--){
let p=particles[i];
p.x+=p.dx;
p.y+=p.dy;
p.alpha-=0.03;

ctx.globalAlpha=p.alpha;
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(p.x,p.y,4,0,Math.PI*2);
ctx.fill();
ctx.globalAlpha=1;

if(p.alpha<=0) particles.splice(i,1);
}

requestAnimationFrame(update);
}

update();

/* ================= GAME OVER ================= */

function gameOver(){
running=false;
gameOverUI.style.display="flex";
finalScore.innerText=score;
}

function restart(){
location.reload();
}

</script>
</body>
</html>
