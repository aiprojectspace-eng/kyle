<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Oyen Adventure – Mirrored Cat Only</title>
    <style>
        :root { --primary: #ff9800; --secondary: #ff5722; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; backdrop-filter: blur(15px); background: rgba(0,0,0,0.75); z-index: 100; text-align: center; padding: 20px; box-sizing: border-box; }
        #ui-layer { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; color: white; font-weight: bold; font-size: 22px; z-index: 50; pointer-events: none; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); padding: 12px 24px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 3.5rem; margin: 0; text-shadow: 0 0 20px var(--primary); font-weight: 900; }
        button { padding: 20px 60px; font-size: 1.8rem; font-weight: bold; border: none; border-radius: 60px; cursor: pointer; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 0 30px rgba(255, 152, 0, 0.5); touch-action: manipulation; }
        #countdown { font-size: 10rem; font-weight: 900; color: white; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="glass">🐟 <span id="score">0</span></div>
        <div class="glass">🏆 <span id="best">0</span></div>
    </div>

    <div id="screen-intro" class="overlay">
        <h1>OYEN RUN</h1>
        <p>Catch fish. Avoid obstacles!</p>
        <button onpointerdown="startCountdown()">START</button>
    </div>

    <div id="screen-count" class="overlay" style="display:none;">
        <div id="countdown">5</div>
    </div>

    <div id="screen-gameover" class="overlay" style="display:none;">
        <h1 style="color: #ff4444;">OYEN KENA!</h1>
        <p>Score: <span id="final-score">0</span></p>
        <button onpointerdown="startCountdown()">RETRY</button>
    </div>

    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Image Assets
const catImg = new Image();
catImg.src = 'cat.png'; 
let catLoaded = false;
catImg.onload = () => { catLoaded = true; };

const obsImg = new Image();
obsImg.src = 'obstacle.png'; 
let obsLoaded = false;
obsImg.onload = () => { obsLoaded = true; };

let state = 'INTRO';
let score = 0;
let highscore = localStorage.getItem("oyen_highscore") || 0;
document.getElementById("best").innerText = highscore;

let W, H, groundY;
function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    groundY = H * 0.8;
}
window.addEventListener('resize', resize);

const oyen = {
    x: 60, // BACK TO LEFT SIDE
    y: 0, w: 90, h: 90,
    vy: 0, gravity: 0.8, jumpPower: -18,
    onGround: false, stretchX: 1, stretchY: 1
};

resize();

let obstacles = [], fishes = [], spawnTimer = 0;

function startCountdown() {
    if (state === 'COUNTDOWN') return;
    document.getElementById('screen-intro').style.display = 'none';
    document.getElementById('screen-gameover').style.display = 'none';
    document.getElementById('screen-count').style.display = 'flex';
    state = 'COUNTDOWN';
    let count = 5;
    const el = document.getElementById('countdown');
    el.innerText = count;
    score = 0; obstacles = []; fishes = [];
    document.getElementById('score').innerText = "0";

    const timer = setInterval(() => {
        count--;
        if (count > 0) el.innerText = count;
        else {
            clearInterval(timer);
            document.getElementById('screen-count').style.display = 'none';
            state = 'PLAYING';
            oyen.y = groundY - oyen.h;
        }
    }, 1000);
}

function jump(e) {
    if (e && e.cancelable) e.preventDefault();
    if (state === 'PLAYING' && oyen.onGround) {
        oyen.vy = oyen.jumpPower;
        oyen.onGround = false;
        oyen.stretchX = 0.7; oyen.stretchY = 1.3;
    }
}

window.addEventListener('touchstart', (e) => { if(state==='PLAYING') jump(e); }, {passive: false});
window.addEventListener('mousedown', (e) => { if(state==='PLAYING') jump(e); });

function loop() {
    // Sky
    const skyGrad = ctx.createLinearGradient(0, 0, 0, groundY);
    skyGrad.addColorStop(0, '#1a2a6c'); skyGrad.addColorStop(1, '#b21f1f');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Ground
    ctx.fillStyle = "#111";
    ctx.fillRect(0, groundY, W, H - groundY);

    if (state === 'PLAYING') {
        oyen.vy += oyen.gravity;
        oyen.y += oyen.vy;
        if (oyen.y > groundY - oyen.h) {
            if(!oyen.onGround) { oyen.stretchX = 1.3; oyen.stretchY = 0.7; }
            oyen.y = groundY - oyen.h; oyen.vy = 0; oyen.onGround = true;
        }

        spawnTimer++;
        if (spawnTimer % 90 === 0) {
            // SPAWN FROM RIGHT
            if(Math.random() > 0.4) obstacles.push({x: W, y: groundY-70, w: 70, h: 70});
            else fishes.push({x: W, y: groundY-150-Math.random()*80, r: 18});
        }

        // Move obstacles RIGHT to LEFT
        obstacles.forEach((o, i) => {
            o.x -= (7 + score/12);
            
            if (obsLoaded) {
                ctx.drawImage(obsImg, o.x, o.y, o.w, o.h);
            } else {
                ctx.fillStyle = "#5d4037";
                ctx.fillRect(o.x, o.y, o.w, o.h);
            }
            
            if(oyen.x < o.x+o.w-20 && oyen.x+oyen.w-20 > o.x && oyen.y < o.y+o.h-20 && oyen.y+oyen.h-20 > o.y) {
                state = 'GAMEOVER';
                document.getElementById('screen-gameover').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
                if(score > highscore) {
                    highscore = score;
                    localStorage.setItem("oyen_highscore", highscore);
                    document.getElementById("best").innerText = highscore;
                }
            }
            if(o.x < -100) obstacles.splice(i, 1);
        });

        // Fish
        fishes.forEach((f, i) => {
            f.x -= 6;
            ctx.fillStyle = "gold";
            ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); ctx.fill();
            if(Math.hypot((oyen.x+oyen.w/2)-f.x, (oyen.y+oyen.h/2)-f.y) < 55) {
                score++;
                document.getElementById('score').innerText = score;
                fishes.splice(i, 1);
            }
        });
    }

    // Draw Oyen (Mirrored to face RIGHT)
    ctx.save();
    oyen.stretchX += (1 - oyen.stretchX) * 0.12;
    oyen.stretchY += (1 - oyen.stretchY) * 0.12;
    ctx.translate(oyen.x + oyen.w/2, oyen.y + oyen.h/2);
    
    // SCALE -1 on X mirrors the image. 
    // Since original images usually face left, -1 makes it face right.
    ctx.scale(oyen.stretchX * -1, oyen.stretchY); 

    if (catLoaded) {
        ctx.drawImage(catImg, -oyen.w/2, -oyen.h/2, oyen.w, oyen.h);
    } else {
        ctx.fillStyle = "orange";
        ctx.beginPath(); ctx.roundRect(-oyen.w/2, -oyen.h/2, oyen.w, oyen.h, 15); ctx.fill();
    }
    ctx.restore();

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
