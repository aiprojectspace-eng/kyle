<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sapikruddin Kyle Adventure - Mobile</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:Arial;
touch-action:none;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:20px;
left:20px;
font-size:22px;
font-weight:bold;
color:white;
text-shadow:0 0 10px black;
}

#gameOver{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
backdrop-filter:blur(6px);
}

button{
padding:18px 40px;
border:none;
border-radius:30px;
background:#ff9800;
color:white;
font-size:20px;
margin-top:20px;
}

#controls{
position:absolute;
bottom:30px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
}

.controlBtn{
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.3);
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
color:white;
backdrop-filter:blur(5px);
}
</style>
</head>
<body>

<div id="ui">
🐟 Score: <span id="score">0</span>
</div>

<div id="gameOver">
<h1>💀 Oyen Kena!</h1>
<p>Score: <span id="finalScore"></span></p>
<button onclick="location.reload()">Play Again</button>
</div>

<div id="controls">
<div class="controlBtn" id="jumpBtn">⬆ Jump</div>
<div class="controlBtn" id="forwardBtn">➡ Run</div>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const scoreEl=document.getElementById("score");
const gameOverUI=document.getElementById("gameOver");
const finalScore=document.getElementById("finalScore");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* ================= CAT ================= */

let cat={
x:80,
y:canvas.height-180,
w:100,
h:100,
vy:0,
gravity:0.8,
jumpPower:-18,
onGround:true,
doubleJump:true,
shield:false
};

let score=0;
let running=true;
let fish=[];
let obstacles=[];
let particles=[];

/* ================= TOUCH CONTROL ================= */

document.getElementById("jumpBtn").addEventListener("touchstart",(e)=>{
e.preventDefault();
jump();
});

document.getElementById("forwardBtn").addEventListener("touchstart",(e)=>{
e.preventDefault();
cat.x+=40;
});

/* Swipe Up = Double Jump */

let touchStartY=0;

canvas.addEventListener("touchstart",(e)=>{
touchStartY=e.touches[0].clientY;
});

canvas.addEventListener("touchend",(e)=>{
let diff=touchStartY - e.changedTouches[0].clientY;
if(diff>50){
doubleJump();
}
});

/* ================= MOVEMENT ================= */

function jump(){
if(cat.onGround){
cat.vy=cat.jumpPower;
cat.onGround=false;
cat.doubleJump=true;
}
}

function doubleJump(){
if(!cat.onGround && cat.doubleJump){
cat.vy=cat.jumpPower;
cat.doubleJump=false;
}
}

/* ================= SPAWN ================= */

setInterval(()=>{
if(!running) return;

fish.push({
x:canvas.width,
y:canvas.height-150,
r:15,
speed:6
});

if(Math.random()<0.6){
obstacles.push({
x:canvas.width,
y:canvas.height-150,
w:50,
h:50,
speed:6
});
}

},1000);

/* ================= PARTICLE ================= */

function createParticles(x,y){
for(let i=0;i<20;i++){
particles.push({
x,y,
dx:(Math.random()-0.5)*8,
dy:(Math.random()-0.5)*8,
alpha:1
});
}
}

/* ================= GAME LOOP ================= */

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* SKY */
let sky=ctx.createLinearGradient(0,0,0,canvas.height);
sky.addColorStop(0,"#87CEEB");
sky.addColorStop(1,"#E0F6FF");
ctx.fillStyle=sky;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* GROUND */
ctx.fillStyle="#4CAF50";
ctx.fillRect(0,canvas.height-80,canvas.width,80);

/* PHYSICS */
cat.vy+=cat.gravity;
cat.y+=cat.vy;

if(cat.y>=canvas.height-180){
cat.y=canvas.height-180;
cat.vy=0;
cat.onGround=true;
}

/* SHADOW */
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.beginPath();
ctx.ellipse(cat.x+50,cat.y+100,45,12,0,0,Math.PI*2);
ctx.fill();

/* CAT DRAW (Simple Cartoon) */

ctx.save();
ctx.translate(cat.x,cat.y);

/* Body */
ctx.fillStyle="#FF8C00";
ctx.beginPath();
ctx.ellipse(50,50,40,50,0,0,Math.PI*2);
ctx.fill();

/* White patch */
ctx.fillStyle="white";
ctx.beginPath();
ctx.ellipse(50,65,20,25,0,0,Math.PI*2);
ctx.fill();

/* Eyes */
ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(35,45,5,0,Math.PI*2);
ctx.arc(65,45,5,0,Math.PI*2);
ctx.fill();

/* Mouth */
ctx.strokeStyle="black";
ctx.beginPath();
ctx.arc(50,60,10,0,Math.PI);
ctx.stroke();

/* Tail */
ctx.strokeStyle="#FF8C00";
ctx.lineWidth=8;
ctx.beginPath();
ctx.moveTo(90,60);
ctx.quadraticCurveTo(120,50,100,90);
ctx.stroke();

ctx.restore();

/* FISH */
for(let i=fish.length-1;i>=0;i--){
let f=fish[i];
f.x-=f.speed;

ctx.fillStyle="gold";
ctx.beginPath();
ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
ctx.fill();

/* Collision */
if(
cat.x < f.x+f.r &&
cat.x+cat.w > f.x-f.r &&
cat.y < f.y+f.r &&
cat.y+cat.h > f.y-f.r
){
score++;
scoreEl.innerText=score;
createParticles(f.x,f.y);
fish.splice(i,1);
}

if(f.x<-50) fish.splice(i,1);
}

/* OBSTACLES */
for(let i=obstacles.length-1;i>=0;i--){
let o=obstacles[i];
o.x-=o.speed;

ctx.fillStyle="#8B4513";
ctx.fillRect(o.x,o.y,o.w,o.h);

if(
cat.x < o.x+o.w &&
cat.x+cat.w > o.x &&
cat.y < o.y+o.h &&
cat.y+cat.h > o.y
){
gameOver();
}

if(o.x<-100) obstacles.splice(i,1);
}

/* PARTICLES */
for(let i=particles.length-1;i>=0;i--){
let p=particles[i];
p.x+=p.dx;
p.y+=p.dy;
p.alpha-=0.03;

ctx.globalAlpha=p.alpha;
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(p.x,p.y,4,0,Math.PI*2);
ctx.fill();
ctx.globalAlpha=1;

if(p.alpha<=0) particles.splice(i,1);
}

requestAnimationFrame(update);
}

update();

/* ================= GAME OVER ================= */

function gameOver(){
running=false;
gameOverUI.style.display="flex";
finalScore.innerText=score;
}

</script>
</body>
</html>
