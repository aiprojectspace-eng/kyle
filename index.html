<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Oyen Adventure – Fix Edition</title>
    <style>
        :root { --primary: #ff9800; --secondary: #ff5722; }
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; }

        /* UI Overlays */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; backdrop-filter: blur(15px); background: rgba(0,0,0,0.8);
            z-index: 100; text-align: center;
        }

        #ui-layer {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            color: white; font-weight: bold; font-size: 20px; z-index: 5;
        }

        .glass { background: rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 20px; }
        
        button {
            padding: 20px 50px; font-size: 1.5rem; font-weight: bold;
            border: none; border-radius: 50px; cursor: pointer;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; box-shadow: 0 0 20px var(--primary);
            z-index: 110; /* Ensure button is on top */
        }

        .cat-preview-img {
            width: 100px; height: 100px; margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        #countdown { font-size: 8rem; font-weight: 900; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="glass">🐟 <span id="score">0</span></div>
        <div class="glass">🏆 <span id="best">0</span></div>
    </div>

    <div id="screen-intro" class="overlay">
        <img src="cat.png" class="cat-preview-img" onerror="this.style.display='none'">
        <h1>OYEN RUN</h1>
        <p>Tap to jump!</p>
        <button onclick="startCountdown()">PLAY GAME</button>
    </div>

    <div id="screen-count" class="overlay" style="display:none;">
        <div id="countdown">5</div>
    </div>

    <div id="screen-gameover" class="overlay" style="display:none;">
        <h1>OYEN KENA!</h1>
        <button onclick="startCountdown()">RETRY</button>
    </div>

    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Image Handling
const catImg = new Image();
catImg.src = 'cat.png'; 
let imgLoaded = false;
catImg.onload = () => { imgLoaded = true; };

let state = 'INTRO';
let score = 0;
let highscore = localStorage.getItem("oyen_highscore") || 0;
document.getElementById("best").innerText = highscore;

let W, H, groundY;
function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    groundY = H * 0.8;
}
window.addEventListener('resize', resize);
resize();

const oyen = {
    x: 60, y: 0, w: 80, h: 80,
    vy: 0, gravity: 0.7, jumpPower: -16,
    onGround: false, stretchX: 1, stretchY: 1
};

let obstacles = [], fishes = [], spawnTimer = 0;

function startCountdown() {
    // Force reset state
    score = 0;
    obstacles = [];
    fishes = [];
    
    document.getElementById('screen-intro').style.display = 'none';
    document.getElementById('screen-gameover').style.display = 'none';
    document.getElementById('screen-count').style.display = 'flex';
    
    let count = 5;
    const el = document.getElementById('countdown');
    el.innerText = count;
    
    const timer = setInterval(() => {
        count--;
        el.innerText = count;
        if (count <= 0) {
            clearInterval(timer);
            document.getElementById('screen-count').style.display = 'none';
            state = 'PLAYING';
            oyen.y = groundY - oyen.h;
        }
    }, 1000);
}

// Input for both Mobile & Desktop
function jump() {
    if (state === 'PLAYING' && oyen.onGround) {
        oyen.vy = oyen.jumpPower;
        oyen.onGround = false;
        oyen.stretchX = 0.7; oyen.stretchY = 1.3;
    }
}
window.addEventListener('touchstart', (e) => { jump(); e.preventDefault(); }, {passive: false});
window.addEventListener('mousedown', jump);

function loop() {
    // Clear screen
    ctx.fillStyle = "#1a2a6c";
    ctx.fillRect(0, 0, W, H);

    // Draw Ground
    ctx.fillStyle = "#222";
    ctx.fillRect(0, groundY, W, H - groundY);

    if (state === 'PLAYING') {
        // Oyen Physics
        oyen.vy += oyen.gravity;
        oyen.y += oyen.vy;
        if (oyen.y > groundY - oyen.h) {
            if(!oyen.onGround) { oyen.stretchX = 1.3; oyen.stretchY = 0.7; }
            oyen.y = groundY - oyen.h;
            oyen.vy = 0;
            oyen.onGround = true;
        }

        // Object Spawning
        spawnTimer++;
        if (spawnTimer % 90 === 0) {
            if(Math.random() > 0.4) obstacles.push({x: W, y: groundY-50, w: 50, h: 50});
            else fishes.push({x: W, y: groundY-120, r: 15});
        }

        // Logic for obstacles
        obstacles.forEach((o, i) => {
            o.x -= 7;
            ctx.fillStyle = "#ff4444";
            ctx.fillRect(o.x, o.y, o.w, o.h);
            if(oyen.x < o.x+o.w-10 && oyen.x+oyen.w-10 > o.x && oyen.y < o.y+o.h-10 && oyen.y+oyen.h-10 > o.y) {
                state = 'GAMEOVER';
                document.getElementById('screen-gameover').style.display = 'flex';
            }
            if(o.x < -100) obstacles.splice(i, 1);
        });

        // Logic for fish
        fishes.forEach((f, i) => {
            f.x -= 5;
            ctx.fillStyle = "gold";
            ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); ctx.fill();
            if(Math.hypot((oyen.x+oyen.w/2)-f.x, (oyen.y+oyen.h/2)-f.y) < 50) {
                score++;
                document.getElementById('score').innerText = score;
                fishes.splice(i, 1);
            }
        });
    }

    // Draw Oyen (Even if PNG fails, draw a backup box)
    ctx.save();
    oyen.stretchX += (1 - oyen.stretchX) * 0.1;
    oyen.stretchY += (1 - oyen.stretchY) * 0.1;
    ctx.translate(oyen.x + oyen.w/2, oyen.y + oyen.h/2);
    ctx.scale(oyen.stretchX, oyen.stretchY);
    
    if (imgLoaded) {
        ctx.drawImage(catImg, -oyen.w/2, -oyen.h/2, oyen.w, oyen.h);
    } else {
        ctx.fillStyle = "orange";
        ctx.fillRect(-oyen.w/2, -oyen.h/2, oyen.w, oyen.h);
    }
    ctx.restore();

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
