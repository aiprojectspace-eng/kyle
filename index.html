<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Oyen Adventure – PNG Edition</title>
    <style>
        :root { --primary: #ff9800; --secondary: #ff5722; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; backdrop-filter: blur(15px); background: rgba(0,0,0,0.7);
            z-index: 10; text-align: center; padding: 20px; box-sizing: border-box;
        }

        #ui-layer {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            color: white; font-weight: bold; font-size: 20px; z-index: 5; pointer-events: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 { font-size: 3rem; margin: 10px 0; text-shadow: 0 0 20px var(--primary); }
        button {
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold;
            border: none; border-radius: 50px; cursor: pointer;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; box-shadow: 0 0 20px var(--primary);
        }

        /* The Intro Cat Icon */
        .cat-preview-img {
            width: 120px; height: 120px; object-fit: contain;
            margin-bottom: 20px; animation: float 2s ease-in-out infinite;
            filter: drop-shadow(0 0 15px var(--primary));
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        #countdown { font-size: 8rem; font-weight: 900; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="glass">🐟 <span id="score">0</span></div>
        <div class="glass">🏆 <span id="best">0</span></div>
    </div>

    <div id="screen-intro" class="overlay">
        <img src="cat.png" class="cat-preview-img" alt="Oyen">
        <h1>OYEN RUN</h1>
        <p>Tap to jump. Catch golden fish!</p>
        <button onclick="startCountdown()">PLAY GAME</button>
    </div>

    <div id="screen-count" class="overlay" style="display:none;">
        <div id="countdown">5</div>
    </div>

    <div id="screen-gameover" class="overlay" style="display:none;">
        <h1>OYEN KENA!</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button onclick="startCountdown()">RETRY</button>
    </div>

    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Load PNG
const catImg = new Image();
catImg.src = 'cat.png';

let state = 'INTRO';
let score = 0;
let highscore = localStorage.getItem("oyen_highscore") || 0;
document.getElementById("best").innerText = highscore;

let W, H, groundY;
function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    groundY = H * 0.8;
}
window.addEventListener('resize', resize);
resize();

const oyen = {
    x: 60, y: 0, w: 90, h: 90, // Adjusted size for PNG
    vy: 0, gravity: 0.7, jumpPower: -18,
    onGround: false,
    stretchX: 1, stretchY: 1
};

let particles = [], obstacles = [], fishes = [], spawnTimer = 0;

function handleJump() {
    if (state === 'PLAYING' && oyen.onGround) {
        oyen.vy = oyen.jumpPower;
        oyen.onGround = false;
        oyen.stretchX = 0.7; oyen.stretchY = 1.3;
    }
}
window.addEventListener('touchstart', (e) => { handleJump(); e.preventDefault(); }, {passive: false});
window.addEventListener('mousedown', handleJump);

function startCountdown() {
    state = 'COUNTDOWN';
    document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
    document.getElementById('screen-count').style.display = 'flex';
    
    let count = 5;
    const el = document.getElementById('countdown');
    el.innerText = count;
    
    const timer = setInterval(() => {
        count--;
        el.innerText = count;
        if(window.navigator.vibrate) window.navigator.vibrate(40);
        if (count <= 0) { clearInterval(timer); initGame(); }
    }, 1000);
}

function initGame() {
    state = 'PLAYING';
    document.getElementById('screen-count').style.display = 'none';
    score = 0;
    document.getElementById('score').innerText = 0;
    obstacles = []; fishes = [];
    oyen.y = groundY - oyen.h;
    spawnTimer = 0;
}

function gameOver() {
    state = 'GAMEOVER';
    if(score > highscore) {
        highscore = score;
        localStorage.setItem("oyen_highscore", highscore);
        document.getElementById("best").innerText = highscore;
    }
    document.getElementById('screen-gameover').style.display = 'flex';
    document.getElementById('final-score').innerText = score;
}

function drawOyen() {
    ctx.save();
    // Smooth animation recovery
    oyen.stretchX += (1 - oyen.stretchX) * 0.15;
    oyen.stretchY += (1 - oyen.stretchY) * 0.15;
    
    ctx.translate(oyen.x + oyen.w/2, oyen.y + oyen.h/2);
    ctx.scale(oyen.stretchX, oyen.stretchY);

    // Shadow under the cat
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath();
    ctx.ellipse(0, oyen.h/2, 30 * oyen.stretchX, 10, 0, 0, Math.PI*2);
    ctx.fill();

    // Draw the actual PNG
    // Note: -w/2 and -h/2 centers the image for the scaling effect
    ctx.drawImage(catImg, -oyen.w/2, -oyen.h/2, oyen.w, oyen.h);
    
    ctx.restore();
}

function loop() {
    // Ultra Sky Gradient
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, '#1a2a6c'); grad.addColorStop(0.5, '#b21f1f'); grad.addColorStop(1, '#fdbb2d');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // Ground
    ctx.fillStyle = "#1d1d1d";
    ctx.fillRect(0, groundY, W, H - groundY);

    if (state === 'PLAYING') {
        oyen.vy += oyen.gravity;
        oyen.y += oyen.vy;
        if (oyen.y > groundY - oyen.h) {
            if(!oyen.onGround) { oyen.stretchX = 1.3; oyen.stretchY = 0.7; }
            oyen.y = groundY - oyen.h;
            oyen.vy = 0;
            oyen.onGround = true;
        }

        spawnTimer++;
        if (spawnTimer % 80 === 0) {
            if(Math.random() > 0.3) obstacles.push({x: W, y: groundY-60, w: 60, h: 60});
            else fishes.push({x: W, y: groundY - 150, r: 20});
        }

        // Obstacles (Crates)
        ctx.fillStyle = "#5d4037";
        obstacles.forEach((o, i) => {
            o.x -= (7 + score/15);
            ctx.shadowBlur = 10; ctx.shadowColor = "black";
            ctx.fillRect(o.x, o.y, o.w, o.h);
            ctx.shadowBlur = 0;
            // Collision logic
            if(oyen.x < o.x+o.w-15 && oyen.x+oyen.w-15 > o.x && oyen.y < o.y+o.h-15 && oyen.y+oyen.h-15 > o.y) {
                gameOver();
            }
            if(o.x < -100) obstacles.splice(i, 1);
        });

        // Fish (Collectibles)
        fishes.forEach((f, i) => {
            f.x -= 6;
            ctx.shadowBlur = 20; ctx.shadowColor = "gold";
            ctx.fillStyle = "gold";
            ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            // Collision
            let dx = (oyen.x + oyen.w/2) - f.x;
            let dy = (oyen.y + oyen.h/2) - f.y;
            if(Math.sqrt(dx*dx + dy*dy) < 50) {
                score++;
                document.getElementById('score').innerText = score;
                fishes.splice(i, 1);
            }
        });
    }

    drawOyen();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
