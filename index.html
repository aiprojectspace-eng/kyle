<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kyle – Ultra Graphics</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
touch-action:none;
background:black;
}

canvas{display:block;}

#ui{
position:absolute;
top:20px;
left:20px;
padding:15px 25px;
border-radius:25px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
color:white;
font-size:22px;
font-weight:bold;
box-shadow:0 0 20px rgba(255,255,255,0.3);
}

#gameOver{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
backdrop-filter:blur(10px);
}

button{
padding:18px 40px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff9800,#ff5722);
color:white;
font-size:20px;
margin-top:20px;
box-shadow:0 0 20px orange;
}
</style>
</head>
<body>

<div id="ui">
🐟 Score: <span id="score">0</span>
</div>

<div id="gameOver">
<h1>💀 Oyen Kena!</h1>
<p>Score: <span id="finalScore"></span></p>
<button onclick="location.reload()">Play Again</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const scoreEl=document.getElementById("score");
const gameOverUI=document.getElementById("gameOver");
const finalScore=document.getElementById("finalScore");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let score=0;
let running=true;

/* ================= GRAPHIC ELEMENTS ================= */

let clouds=[];
let stars=[];
let mountains=[];
let grass=[];

/* Create elements */
for(let i=0;i<80;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height/2,
r:Math.random()*2
});
}

for(let i=0;i<5;i++){
clouds.push({
x:Math.random()*canvas.width,
y:Math.random()*200,
size:50+Math.random()*80,
speed:0.5+Math.random()
});
}

for(let i=0;i<3;i++){
mountains.push({
x:i*canvas.width/2,
height:150+Math.random()*150,
speed:0.5+i*0.3,
color:["#2C3E50","#34495E","#1F2D3D"][i]
});
}

for(let i=0;i<100;i++){
grass.push({
x:i*20,
wave:Math.random()*Math.PI*2,
height:20+Math.random()*40
});
}

/* ================= CAT ================= */

let cat={
x:80,
y:canvas.height-200,
w:110,
h:110,
vy:0,
gravity:0.8,
jump:-18,
onGround:true
};

canvas.addEventListener("click",jump);

function jump(){
if(cat.onGround){
cat.vy=cat.jump;
cat.onGround=false;
}
}

/* ================= SPAWN ================= */

let fish=[];
let obstacles=[];

setInterval(()=>{
if(!running) return;

fish.push({
x:canvas.width,
y:canvas.height-160,
r:18,
speed:6,
offset:0
});

if(Math.random()<0.6){
obstacles.push({
x:canvas.width,
y:canvas.height-160,
w:55,
h:55,
speed:6
});
}

},900);

/* ================= DRAW BACKGROUND ================= */

function drawBackground(){

/* Sky Gradient */
let sky=ctx.createLinearGradient(0,0,0,canvas.height);
sky.addColorStop(0,"#0f2027");
sky.addColorStop(0.5,"#203a43");
sky.addColorStop(1,"#2c5364");
ctx.fillStyle=sky;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* Stars */
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});

/* Clouds (soft + glow) */
clouds.forEach(c=>{
c.x-=c.speed;
ctx.fillStyle="rgba(255,255,255,0.8)";
ctx.shadowColor="white";
ctx.shadowBlur=20;
ctx.beginPath();
ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
ctx.fill();
ctx.shadowBlur=0;
if(c.x<-200) c.x=canvas.width+200;
});

/* Mountains (Parallax) */
mountains.forEach(m=>{
m.x-=m.speed;
ctx.fillStyle=m.color;
ctx.beginPath();
ctx.moveTo(m.x,canvas.height-80);
ctx.lineTo(m.x+canvas.width/2,canvas.height-80);
ctx.lineTo(m.x+canvas.width/4,canvas.height-m.height);
ctx.closePath();
ctx.fill();

if(m.x<-canvas.width) m.x=canvas.width;
});

/* Ground */
ctx.fillStyle="#2E8B57";
ctx.fillRect(0,canvas.height-80,canvas.width,80);

/* Grass Wind Effect */
grass.forEach(g=>{
g.wave+=0.08;
let sway=Math.sin(g.wave)*8;

ctx.strokeStyle="#3CB371";
ctx.lineWidth=4;
ctx.beginPath();
ctx.moveTo(g.x,canvas.height-80);
ctx.quadraticCurveTo(
g.x+sway,
canvas.height-100-g.height,
g.x,
canvas.height-80-g.height
);
ctx.stroke();
});

}

/* ================= GAME LOOP ================= */

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawBackground();

/* Physics */
cat.vy+=cat.gravity;
cat.y+=cat.vy;

if(cat.y>=canvas.height-190){
cat.y=canvas.height-190;
cat.vy=0;
cat.onGround=true;
}

/* Shadow */
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.beginPath();
ctx.ellipse(cat.x+55,cat.y+115,50,15,0,0,Math.PI*2);
ctx.fill();

/* ===== CAT (Better Rounded + Glow) ===== */

ctx.save();
ctx.translate(cat.x,cat.y);

ctx.shadowColor="#FF8C00";
ctx.shadowBlur=30;

ctx.fillStyle="#FF8C00";
ctx.beginPath();
ctx.roundRect(0,0,100,100,40);
ctx.fill();

ctx.shadowBlur=0;

/* Eyes */
ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(35,45,6,0,Math.PI*2);
ctx.arc(65,45,6,0,Math.PI*2);
ctx.fill();

/* Mouth */
ctx.strokeStyle="black";
ctx.lineWidth=3;
ctx.beginPath();
ctx.arc(50,65,12,0,Math.PI);
ctx.stroke();

/* Tail */
ctx.strokeStyle="#FF8C00";
ctx.lineWidth=10;
ctx.beginPath();
ctx.moveTo(100,60);
ctx.quadraticCurveTo(140,40,120,100);
ctx.stroke();

ctx.restore();

/* ===== FISH ===== */

for(let i=fish.length-1;i>=0;i--){
let f=fish[i];
f.x-=f.speed;
f.offset+=0.1;

ctx.shadowColor="yellow";
ctx.shadowBlur=20;
ctx.fillStyle="gold";
ctx.beginPath();
ctx.arc(f.x,f.y+Math.sin(f.offset)*5,f.r,0,Math.PI*2);
ctx.fill();
ctx.shadowBlur=0;

if(
cat.x < f.x+f.r &&
cat.x+cat.w > f.x-f.r &&
cat.y < f.y+f.r &&
cat.y+cat.h > f.y-f.r
){
score++;
scoreEl.innerText=score;
fish.splice(i,1);
}

if(f.x<-50) fish.splice(i,1);
}

/* ===== OBSTACLES ===== */

for(let i=obstacles.length-1;i>=0;i--){
let o=obstacles[i];
o.x-=o.speed;

ctx.fillStyle="#8B4513";
ctx.shadowColor="black";
ctx.shadowBlur=15;
ctx.beginPath();
ctx.roundRect(o.x,o.y,o.w,o.h,15);
ctx.fill();
ctx.shadowBlur=0;

if(
cat.x < o.x+o.w &&
cat.x+cat.w > o.x &&
cat.y < o.y+o.h &&
cat.y+cat.h > o.y
){
running=false;
gameOverUI.style.display="flex";
finalScore.innerText=score;
}

if(o.x<-100) obstacles.splice(i,1);
}

requestAnimationFrame(update);
}

update();

</script>
</body>
</html>
